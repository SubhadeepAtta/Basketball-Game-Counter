<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basketball Game</title>
  <link rel="stylesheet" href="basketball.css">
  <link href="https://fonts.cdnfonts.com/css/seven-segment" rel="stylesheet">
  
</head>
<body>
  <script src="basketball.js"></script>
  <div class="game">
    <h1>HOME</h1>
    <p class="score" id="scoreHome">0</p>
    <button class="btn" onclick="addOneHome()">+1</button>
    <button class="btn" onclick="addTwoHome()">+2</button>
    <button class="btn" onclick="addThreeHome()">+3</button>
  </div>
  <div class="game">
    <h1>GUEST</h1>
    <p class="score" id="scoreGuest">0</p>
    <button class="btn" onclick="addOneGuest()">+1</button>
    <button class="btn" onclick="addTwoGuest()">+2</button>
    <button class="btn" onclick="addThreeGuest()">+3</button>
  </div>
</body>
</html>
